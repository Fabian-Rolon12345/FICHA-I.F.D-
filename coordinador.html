<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Coordinador — IFDSR 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles/coordinador.css">
</head>
<body>

    <!-- Login -->
    <div class="auth-container" id="authContainer">
        <div class="auth-card">
            <div class="auth-logo">🔐</div>
            <h2>Acceso Coordinador</h2>
            <p>Instituto de Formación Docente Santa Rosa</p>
            
            <div class="auth-error" id="authError">
                ❌ Contraseña incorrecta.
            </div>
            
            <input type="password" id="passwordInput" placeholder="Ingrese contraseña" maxlength="20">
            <button class="btn btn-primary" style="width: 100%;" onclick="login()">
                Ingresar al Panel
            </button>
            
            <div class="auth-hint">
                ¿Olvidaste la contraseña? Contacta al administrador.
            </div>
        </div>
    </div>

    <!-- Panel Principal -->
    <div class="coordinator-container" id="panelContainer" style="display: none;">
        
        <!-- Header con Logo -->
        <header class="panel-header">
            <div class="header-left">
                <div class="header-logo-circle">
                    <img src="logo-ifd.png" alt="Logo IFDSR">
                </div>
                <div class="header-text">
                    <h1>Panel Coordinador</h1>
                    <p>Registros Estudiantiles 2026 · IFDSR Misiones</p>
                </div>
            </div>
            <button class="btn btn-outline" onclick="logout()">
                🚪 Salir
            </button>
        </header>

        <!-- Filtros de Carrera y Botón Copiar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>Carrera:</label>
                <select id="filterCarrera" onchange="cargarRegistros()">
                    <option value="todas">📋 Todas las carreras</option>
                    <option value="Profesorado EEB 1.º y 2.º Ciclo">Profesorado EEB 1.º y 2.º Ciclo</option>
                    <option value="Profesorado de Educación Física y Salud">Profesorado de Educación Física y Salud</option>
                    <option value="Especialización en Ciencias Naturales">Especialización en Ciencias Naturales</option>
                    <option value="Especialización en Artes — Cohorte 2025-2026">Especialización en Artes — Cohorte 2025-2026</option>
                    <option value="Especialización en Artes — Cohorte 2026-2027">Especialización en Artes — Cohorte 2026-2027</option>
                    <option value="Especialización en Matemáticas">Especialización en Matemáticas</option>
                    <option value="Habilitación Pedagógica para Profesionales — Cohorte 2025-2026">Habilitación Pedagógica — Cohorte 2025-2026</option>
                    <option value="Habilitación Pedagógica para Profesionales — Cohorte 2026-2027">Habilitación Pedagógica — Cohorte 2026-2027</option>
                    <option value="Técnico en Gestión Educativa">Técnico en Gestión Educativa</option>
                    <option value="Técnico Docente en Integración Pedagógica TIC">Técnico Docente en Integración Pedagógica TIC</option>
                </select>
            </div>

            <button class="btn-copy-link" onclick="copiarEnlace()">
                📋 Copiar Enlace de Inscripción
            </button>
        </div>

        <!-- Tabla de Datos -->
        <div class="table-container">
            <div class="table-header">
                <span>Foto</span>
                <span>Estudiante</span>
                <span>C.I.</span>
                <span>Carrera</span>
                <span style="text-align: right;">Acción</span>
            </div>
            <div id="tableBody">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Selecciona una carrera para ver los registros</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Modal Detalle -->
    <div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <img id="modalFoto" class="modal-foto" src="" alt="Foto">
                <div class="modal-info">
                    <div class="modal-name" id="modalNombre"></div>
                    <div class="modal-ci" id="modalCI"></div>
                    <div class="modal-carrera" id="modalCarrera"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Se llena con JS -->
            </div>
        </div>
    </div>

    <script>
        // 🔑 CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = 'https://wazkjibgudacpvdwmggw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vkUugBFW0TDMYC_MNmNRaQ_NTcjns0w';
        const PASSWORD = 'ifdsr2026';

        // Inicializar cliente Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allRegistros = [];
        let filteredRegistros = [];

        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === PASSWORD) {
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('panelContainer').style.display = 'block';
                cargarRegistros();
            } else {
                const error = document.getElementById('authError');
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 3000);
            }
        }

        function logout() { location.reload(); }

        async function cargarRegistros() {
            const carrera = document.getElementById('filterCarrera').value;
            const tbody = document.getElementById('tableBody');
            
            tbody.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Cargando registros...</p></div>';

            try {
                let query = supabase.from('registros').select('*');
                
                if (carrera !== 'todas') {
                    query = query.eq('carrera', carrera);
                }
                
                
                query = query.order('created_at', { ascending: false });
                
                const { data, error } = await query;
                
                if (error) throw error;
                
                allRegistros = data || [];
                filteredRegistros = allRegistros;
                aplicarBusqueda();
                actualizarStats();
                
            } catch (error) {
                console.error('Error:', error);
                tbody.innerHTML = '<div class="error-state">Error al cargar: ' + error.message + '</div>';
            }
        }

        function renderizarTabla() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredRegistros.length === 0) {
                tbody.innerHTML = '<div class="empty-state">No hay estudiantes registrados en esta selección.</div>';
                return;
            }
            
            let html = '';
            filteredRegistros.forEach(reg => {
                const fotoSrc = reg.foto || 'https://via.placeholder.com/50x67?text=Sin+Foto';
                
                html += `
                    <div class="table-row">
                        <img src="${fotoSrc}" alt="Foto" class="student-foto" onerror="this.src='https://via.placeholder.com/50x67?text=Sin+Foto'">
                        <div>
                            <div class="student-name">${reg.apellidoNombre}</div>
                            <div class="student-email">${reg.emailPersonal}</div>
                        </div>
                        <div>${reg.ci}</div>
                        <div>${reg.carrera}</div>
                        <div style="text-align: right;">
                            <button class="btn-sm" onclick="verDetalle('${reg.id}')">
                                Ver Detalle
                            </button>
                        </div>
                    </div>
                `;
            });
            
            tbody.innerHTML = html;
        }

        function verDetalle(id) {
            const reg = allRegistros.find(r => r.id === id);
            if (!reg) return;
            
            document.getElementById('modalFoto').src = reg.foto || 'https://via.placeholder.com/72x96?text=Foto';
            document.getElementById('modalNombre').textContent = reg.apellidoNombre;
            document.getElementById('modalCI').textContent = 'C.I.: ' + reg.ci;
            document.getElementById('modalCarrera').textContent = reg.carrera;
            
            const fechaReg = new Date(reg.fechaRegistro).toLocaleString('es-PY');
            
            let html = `
                <div class="modal-section-title">👤 Datos Personales</div>
                <div class="modal-grid">
                    <div class="modal-field"><label>Fecha Nac.</label><p>${formatDate(reg.fechaNacimiento)}</p></div>
                    <div class="modal-field"><label>Edad</label><p>${reg.edad}</p></div>
                    <div class="modal-field"><label>Sexo</label><p>${reg.sexo}</p></div>
                    <div class="modal-field"><label>Nacionalidad</label><p>${reg.nacionalidad}</p></div>
                    <div class="modal-field"><label>Ciudad</label><p>${reg.ciudad}</p></div>
                    <div class="modal-field"><label>Departamento</label><p>${reg.departamento}</p></div>
                    <div class="modal-field"><label>Celular</label><p>${reg.celular}</p></div>
                    <div class="modal-field"><label>Email</label><p>${reg.emailPersonal}</p></div>
                </div>
                
                <div class="modal-section-title">🎓 Datos Académicos</div>
                <div class="modal-grid">
                    <div class="modal-field"><label>Cohorte</label><p>${reg.cohorte}</p></div>
                    <div class="modal-field"><label>Turno</label><p>${reg.turno}</p></div>
                </div>
                
                <div class="modal-section-title">📅 Registro</div>
                <div class="modal-grid">
                    <div class="modal-field"><label>Fecha</label><p>${fechaReg}</p></div>
                </div>
            `;
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        function copiarEnlace() {
            // URL fija de Vercel para el formulario de estudiantes
            const url = 'https://ficha-i-f-d.vercel.app/index.html';
            
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ Enlace de inscripción copiado:\n\n' + url);
            }).catch(() => {
                prompt('Copia este enlace manualmente:', url);
            });
        }

        function closeModal(event) {
            if (!event || event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.add('hidden');
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const [year, month, day] = dateStr.split('-');
            return day + '/' + month + '/' + year;
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
